<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barfitos Olavarría</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 400px;
  margin: auto;
}

.card {
  background: #1c1c1c;
  padding: 20px;
  border-radius: 20px;
  margin-bottom: 20px;
}

.orange {
  background: linear-gradient(135deg, #ff7a00, #ff3c00);
}

.big {
  font-size: 32px;
  color: orange;
}

.result {
  font-size: 20px;
  margin-top: 10px;
}

.btn {
  display: block;
  margin-top: 15px;
  padding: 15px;
  border-radius: 15px;
  text-decoration: none;
  font-weight: bold;
}

.whatsapp { background: #25D366; color: white; }
.instagram { background: #E1306C; color: white; }
</style>
</head>

<body>

<div class="container">

<h1>BARFITOS</h1>
<p>Olavarría 🐶</p>

<div class="card">

<label>Tipo de perro</label>
<select id="tipo" onchange="calcular()">
  <option value="0.03">Adulto</option>
  <option value="0.04">Activo</option>
  <option value="0.05">Cachorro</option>
</select>

<label>Peso (kg)</label>
<input type="range" id="peso" min="1" max="50" value="10" oninput="calcular()">

<div class="big" id="pesoValor">10 kg</div>

<div class="result" id="resultado"></div>
<div class="result" id="mensual"></div>

</div>

<div class="card orange">

<h2>🔥 Pack disponible</h2>

<div style="background:white;color:black;padding:15px;border-radius:15px;">
<strong>Pack 3kg Barfitos</strong><br>
$26.000<br>
<span id="duracion"></span>
</div>

<a id="btnWhats" class="btn whatsapp">Comprar por WhatsApp</a>

<a href="https://www.instagram.com/barfitos.olavarria?utm_source=qr&igsh=MmlldjNiY3RrYzZr" class="btn instagram">
Ver Instagram
</a>

</div>

</div>

<script>
function calcular() {

  let peso = document.getElementById("peso").value;
  let tipo = document.getElementById("tipo").value;

  document.getElementById("pesoValor").innerText = peso + " kg";

  let comida = peso * tipo * 1000;

  let cubos = comida / 20;

  let kgMes = (comida * 30) / 1000;

  document.getElementById("resultado").innerText =
    "Dale " + cubos.toFixed(0) + " cubos por día 🐾";

  document.getElementById("mensual").innerText =
    "Necesita aprox " + kgMes.toFixed(1) + " kg por mes";

  let dias = 3000 / comida;

  document.getElementById("duracion").innerText =
    "Te dura aprox " + dias.toFixed(1) + " días";

  let mensaje =
  "Hola! Tengo un perro de " + peso + "kg.\n" +
  "Necesita " + cubos.toFixed(0) + " cubos por día.\n" +
  "Consume " + kgMes.toFixed(1) + " kg por mes.\n" +
  "Quiero comprar Barfitos 🐶";

  let url = "https://wa.me/5492384660264?text=" + encodeURIComponent(mensaje);

  document.getElementById("btnWhats").href = url;
}

calcular();
</script>

</body>
</html>
